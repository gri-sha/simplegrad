site_name: simplegrad
site_description: A lightweight autograd engine for education and experimentation.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
  palette:
    scheme: default
    primary: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 3
            docstring_style: google

nav:
  - Home: index.md
  - API Reference:
    - Tensor: api/tensor.md
    - Factory Functions: api/factory.md
    - Dtypes: api/dtypes.md
    - Functions:
      - Activations: api/functions/activations.md
      - Math: api/functions/math.md
      - Losses: api/functions/losses.md
      - Reductions: api/functions/reduction.md
      - Conv2d: api/functions/conv.md
      - Pooling: api/functions/pooling.md
      - Transform: api/functions/transform.md
    - nn Layers:
      - Module: api/nn/module.md
      - Linear: api/nn/linear.md
      - Conv2d: api/nn/conv.md
      - Sequential: api/nn/sequential.md
      - Dropout: api/nn/dropout.md
      - MaxPool2d: api/nn/pooling.md
      - Flatten: api/nn/transform.md
      - Embedding: api/nn/embedding.md
      - Activations: api/nn/activations.md
      - Losses: api/nn/losses.md
    - Optimizers:
      - SGD: api/optimizers/sgd.md
      - Adam: api/optimizers/adam.md
    - Tracking: api/track.md
    - Visualization: api/visual.md
