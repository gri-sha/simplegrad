site_name: simplegrad
site_description: A lightweight autograd engine for education and experimentation.
site_url: https://simplegrad.github.io/

repo_url: https://github.com/simplegrad/simplegrad
repo_name: simplegrad/simplegrad

theme:
  name: material
  custom_dir: docs/overrides
  favicon: images/favicon.svg
  logo: images/favicon.svg
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.sections
    - navigation.expand

extra_css:
  - https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_full_path: false
            show_root_heading: true
            show_root_toc_entry: true
            heading_level: 2
            docstring_style: google
            annotations_path: brief
            show_signature_annotations: true
            docstring_section_style: list

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Core:
    - Tensor & Autograd: api/core/autograd.md
    - Function & Context: api/core/function.md
    - Compound Ops: api/core/compound_ops.md
    - Dtypes: api/dtypes.md
    - Factory Functions: api/factory.md
    - Module: api/core/module.md
    - Optimizer: api/core/optimizer.md
    - Scheduler: api/core/scheduler.md
  - Functions:
    - Math: api/functions/math.md
    - Activations: api/functions/activations.md
    - Reductions: api/functions/reduction.md
    - Transform: api/functions/transform.md
    - Conv2d: api/functions/conv.md
    - Pooling: api/functions/pooling.md
    - Losses: api/functions/losses.md
  - NN Layers:
    - Linear: api/nn/linear.md
    - Conv2d: api/nn/conv.md
    - Sequential: api/nn/sequential.md
    - Dropout: api/nn/dropout.md
    - MaxPool2d: api/nn/pooling.md
    - Flatten: api/nn/transform.md
    - Embedding: api/nn/embedding.md
    - Activations: api/nn/activations.md
    - Losses: api/nn/losses.md
  - Optimizers:
    - SGD: api/optimizers/sgd.md
    - Adam: api/optimizers/adam.md
  - Schedulers:
    - Overview: api/schedulers/linear.md
  - Tracking:
    - Overview: api/track.md
  - Visualization:
    - Inline: api/visual.md
    - SimpleBoard: api/simpleboard.md
